<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATML Lab 6 - Neural Machine Translation</title>
    <meta name="description" content="English to Hindi Machine Translation System">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="app-container">
        <header>
            <div class="brand">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M2 12h20"></path><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                </div>
                <div>
                    <h1>Neural Translate</h1>
                    <p>English &rarr; Hindi • Encoder-Decoder Architecture</p>
                </div>
            </div>
            <div class="status-indicator">
                <span class="dot" id="connection-dot"></span>
                <span id="connection-text">Model Ready</span>
            </div>
        </header>

        <section class="translation-wrapper">
            <!-- Source Text Area -->
            <div class="pane source-pane">
                <div class="pane-header">
                    <h2>English (Source)</h2>
                    <button class="icon-btn" id="clear-btn" aria-label="Clear text" title="Clear text">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div class="text-container">
                    <textarea id="source-text" placeholder="Start typing to translate in real-time..." spellcheck="false" autofocus></textarea>
                </div>
                <div class="pane-footer">
                    <span class="char-count" id="char-count">0 / 500</span>
                </div>
            </div>

            <!-- Translate Action (Desktop uses auto, but good to have a visual middle connector) -->
            <div class="connector">
                <div class="exchange-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v12"></path><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2h0a3.13 3.13 0 0 1 3 3.88Z"></path></svg>
                </div>
            </div>

            <!-- Target Text Area -->
            <div class="pane target-pane">
                <div class="pane-header">
                    <h2>Hindi (Target)</h2>
                    <div class="pane-actions">
                        <div class="loader-spinner" id="loader"></div>
                        <button class="icon-btn" id="copy-btn" aria-label="Copy translation" title="Copy to clipboard">
                             <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="text-container target-text-container">
                    <div id="target-text" class="placeholder">अनुवाद यहाँ दिखाई देगा... (Translation will appear here)</div>
                </div>
                <div class="pane-footer">
                    <span class="api-credit">Powered by Model Inference</span>
                </div>
            </div>
        </section>

        <div class="toast" id="toast">Copied to clipboard!</div>
    </main>

    <script src="app.js"></script>
</body>
</html>
